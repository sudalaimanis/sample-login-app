services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://app:app@db:5432/appdb
      CORS_ORIGIN: http://localhost:5173
      JWT_SECRET: ${JWT_SECRET:-dev-docker-change-me}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3001/health',(r)=>{let b='';r.on('data',c=>b+=c);r.on('end',()=>process.exit(r.statusCode===200&&b.includes('ok')?0:1));}).on('error',()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://api:3001
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
